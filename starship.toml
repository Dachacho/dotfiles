# Get a sharp, high-contrast look
add_newline = true

# The palette definition (Carbonfox official hex codes)
[palettes.carbonfox]
bg = "#161616"      # Deep Carbon Black
blue = "#78a9ff"    # Electric Blue
magenta = "#be95ff" # Saturated Purple
cyan = "#33b1ff"    # High-contrast Cyan
white = "#f2f4f8"   # Crisp White
gray = "#393939"    # Dark gray for separators

# Applying the palette
palette = "carbonfox"

[character]
success_symbol = "[󰄛](bold blue)" 
error_symbol = "[󰄛](bold #ee5396)"

[directory]
style = "bold cyan"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold magenta"

[git_status]
style = "bold #ee5396" # Red/Pink alert

[nodejs]
symbol = " "
style = "bold #25be6a" # Saturated Green

[rust]
symbol = " "
style = "bold #be95ff"

[cmd_duration]
min_time = 500
style = "bold #f1c21b" # Saturated Yellow